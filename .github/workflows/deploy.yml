name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write  # needed for gh-pages push

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run export

      - name: Ensure .nojekyll present
        run: |
          if [ ! -f out/.nojekyll ]; then
            touch out/.nojekyll
          fi

      - name: Sanity check CSS chunk
        run: |
          ls -1 out/_next/static/chunks | grep -E '\\.css$' || (echo 'CSS chunk missing!' && exit 1)

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: out
          force_orphan: true
          commit_message: "Deploy static export: ${{ github.sha }}"
